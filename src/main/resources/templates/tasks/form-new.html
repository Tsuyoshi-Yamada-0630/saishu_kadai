<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク新規作成</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 20px;
        }
        label {
            font-size: 13px;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            height: 100px;
        }
        .btn-submit {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>タスク新規作成</h1>
    <form th:action="@{/tasks}" method="post">
        <label>タイトル</label>
        <input type="text" name="title" required>
        <label>内容</label>
        <textarea name="content"></textarea>
        <label>名前</label>
        <input type="text" name="name">
        <label>開始日</label>
        <input type="date" name="startDate">
        <label>終了日</label>
        <input type="date" name="endDate">
        <button type="submit" class="btn-submit">完了</button>
        <a href="/tasks"><button type="button" class="btn-cancel">←キャンセル</button></a>
    </form>
</body>
</html>
