spring.thymeleaf.mode=HTML

# Postgres接続先設定
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/todo_app
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# schema.sql を自動実行
spring.sql.init.mode=always

# ログレベル
logging.level.sample=DEBUG

# MyBatis設定
mybatis.type-aliases-package=sample.common.dao.entity
mybatis.mapper-locations=classpath:sample/common/dao/mapper/*.xml

# セッション有効期限設定
server.servlet.session.timeout=1d